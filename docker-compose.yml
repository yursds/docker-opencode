# ==============================================================================
# AI Dev Container — docker-compose
# ==============================================================================
# Usage:
#   docker compose --env-file configs/<project>.env --profile cpu up -d
#   docker compose --env-file configs/<project>.env --profile gpu up -d
#
# Each project gets its own .env in configs/ with:
#   PROJECT_NAME, PROJECT_PATH, CONTAINER_SUFFIX
# This ensures unique image names, container names, and config dirs.
# ==============================================================================

services:
  dev-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
      args:
        MYUID: ${MYUID:-1000}
        MYGID: ${MYGID:-1000}
        DOCKER_USERNAME: hannya
        UBUNTU_VERSION: ${UBUNTU_VERSION:-22.04}
        CUDA_VERSION: ${CUDA_VERSION:-12.4.1}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
        SKIP_OPENAGENT: ${SKIP_OPENAGENT:-false}
    image: ${PROJECT_NAME}:${COMPOSE_PROFILE:-gpu}
    container_name: ${PROJECT_NAME}-${COMPOSE_PROFILE:-gpu}
    hostname: naraku
    profiles: [ "gpu" ]

    stdin_open: true
    tty: true

    volumes:
      - ${PROJECT_PATH:-.}:/home/hannya/workspace:rw
      # To disable persistent bash history, comment the line below
      - ./.data_history/${PROJECT_NAME}-gpu:/home/hannya/.data_history
      # Optional: mount host git/gh configs if they exist
      - ${HOME:-~}/.gitconfig:/home/hannya/.gitconfig:ro,optional
      - ${HOME:-~}/.config/gh:/home/hannya/.config/gh:ro,optional
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri

    shm_size: "2gb"
    network_mode: host

    working_dir: /home/hannya/workspace

    environment:
      - HOME=/home/hannya
      - MYUID=${MYUID:-1000}
      - MYGID=${MYGID:-1000}
      - TERM=xterm-256color
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENCODE_CONFIG=free
      - XLA_PYTHON_CLIENT_MEM_FRACTION=${XLA_PYTHON_CLIENT_MEM_FRACTION:-0.7}
      - XLA_PYTHON_CLIENT_PREALLOCATE=${XLA_PYTHON_CLIENT_PREALLOCATE:-false}
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

    security_opt:
      - no-new-privileges:false
    cap_drop:
      - SYS_ADMIN
      - NET_RAW
      - MKNOD
      - AUDIT_WRITE
      - SETFCAP
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - SYS_PTRACE
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
      - NET_ADMIN

    restart: "no"

  dev-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
      args:
        MYUID: ${MYUID:-1000}
        MYGID: ${MYGID:-1000}
        DOCKER_USERNAME: hannya
        UBUNTU_VERSION: ${UBUNTU_VERSION:-24.04}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
        SKIP_OPENAGENT: ${SKIP_OPENAGENT:-false}
    image: ${PROJECT_NAME}:${COMPOSE_PROFILE:-cpu}
    container_name: ${PROJECT_NAME}-${COMPOSE_PROFILE:-cpu}
    hostname: naraku
    profiles: [ "cpu" ]

    stdin_open: true
    tty: true

    volumes:
      - ${PROJECT_PATH:-.}:/home/hannya/workspace:rw
      # To disable persistent bash history, comment the line below
      - ./.data_history/${PROJECT_NAME}-cpu:/home/hannya/.data_history
      # Optional: mount host git/gh configs if they exist
      - ${HOME:-~}/.gitconfig:/home/hannya/.gitconfig:ro,optional
      - ${HOME:-~}/.config/gh:/home/hannya/.config/gh:ro,optional

      - type: bind
        source: ./configs/opencode
        target: /home/hannya/.config/opencode
        read_only: true
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri

    shm_size: "2gb"
    network_mode: host

    working_dir: /home/hannya/workspace

    environment:
      - HOME=/home/hannya
      - MYUID=${MYUID:-1000}
      - MYGID=${MYGID:-1000}
      - TERM=xterm-256color
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENCODE_CONFIG=free
      - JAX_PLATFORMS=cpu
      - UV_PROJECT_ENVIRONMENT=$HOME/workspace/.venv
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1

    security_opt:
      - no-new-privileges:false
    cap_drop:
      - SYS_ADMIN
      - NET_RAW
      - MKNOD
      - AUDIT_WRITE
      - SETFCAP
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - SYS_PTRACE
      - DAC_OVERRIDE
      - FOWNER
      - KILL
      - NET_BIND_SERVICE
      - NET_ADMIN

    restart: "no"
